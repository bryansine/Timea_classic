{% comment %} 
<header style="background-color: #1a1a1a; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; color: #fff;">
        
    <div class="brand-section" style="display: flex; align-items: center; gap: 20px;">
        <span class="brand-title" style="font-size: 24px; font-weight: bold; font-family: sans-serif;">Timea-classic</span>
        <div class="logo-container" style="background-color: #fff; padding: 5px 10px; border-radius: 4px;">
            <img src="/static/images/logo.png" alt="babyshop" style="height: 30px; display: block;"> 
        </div>
    </div>

    <div class="info-section" style="text-align: center; font-size: 13px; font-family: sans-serif;">
        <p style="margin: 0 0 5px 0;">Delivery: <span style="color: #4a90e2;">Next Day Countrywide</span></p>
        <p style="margin: 0;">Support Desk: <span style="color: #4a90e2;">+254 713 42 38 85</span></p>
    </div>

    <div class="actions-section" style="display: flex; gap: 15px; align-items: center;">
        <a href="{% url 'about' %}" class="about-btn" style="text-decoration: none; background-color: #2a2d32; color: #fff; padding: 8px 16px; border-radius: 4px; font-size: 13px; font-family: sans-serif; font-weight: 600; text-transform: uppercase;">About Us</a>
        <a href="{% url 'register' %}" class="auth-btn" style="text-decoration: none; background-color: #2a2d32; color: #fff; padding: 8px 16px; border-radius: 4px; font-size: 13px; font-family: sans-serif; font-weight: 600; text-transform: uppercase;">Sign Up</a>
        <a href="{% url 'login' %}" class="auth-btn" style="text-decoration: none; background-color: #2a2d32; color: #fff; padding: 8px 16px; border-radius: 4px; font-size: 13px; font-family: sans-serif; font-weight: 600; text-transform: uppercase;">Sign In</a>
    </div>

</header> {% endcomment %}
