<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support Center - Timea Classic</title>
</head>
<body style="font-family: system-ui, sans-serif; background-color: #f4f6f9; padding: 30px;">

    <div style="max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <h1 style="color: #1a1a1a; font-size: 24px; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px;">
            🎧 Timea Classic Support Desk
        </h1>
        <p style="color: #666; margin-bottom: 25px;">Select a customer below to open a real-time messaging pipeline:</p>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            {% for customer in customers %}
            <div style="border: 1px solid #eee; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>{{ customer.username }}</strong> ({{ customer.email }})
                </div>
                
                <a href="{% url 'room' customer.username %}" style="background-color: #007bff; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 13px;">
                    Open Chat 💬
                </a>
            </div>
        {% endfor %}
        </div>

        
    </div>

</body>
</html>
