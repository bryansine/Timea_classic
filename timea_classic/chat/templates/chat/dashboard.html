<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support Center - Timea Classic</title>
</head>
<body style="font-family: system-ui, sans-serif; background-color: #f4f6f9; padding: 30px;">

    <div style="max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
        <h1 style="color: #1a1a1a; font-size: 24px; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 15px;">
            🎧 Timea Classic Support Desk
        </h1>
        <p style="color: #666; margin-bottom: 25px;">Select a customer below to open a real-time messaging pipeline:</p>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            {% for customer in customers %}
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; transition: transform 0.2s;">
                    <div>
                        <strong style="color: #333; font-size: 16px;">{{ customer.username }}</strong>
                        <span style="color: #888; font-size: 13px; margin-left: 10px;">({{ customer.email|default:"No email registered" }})</span>
                    </div>
                    <a href="{% url 'room' customer.username %}" style="text-decoration: none; background: #007bff; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 500; font-size: 14px;">
                        Open Chat 💬
                    </a>
                </div>
            {% empty %}
                <p style="color: #999; text-align: center; padding: 20px;">No registered customers found yet.</p>
            {% endfor %}
        </div>
    </div>

</body>
</html>
