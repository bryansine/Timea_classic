{% if user.is_authenticated %}
    <button id="chatButton" style="position: fixed; bottom: 25px; right: 25px; z-index: 1000; background: linear-gradient(135deg, #007bff, #0056b3); color: white; border: none; border-radius: 50px; padding: 12px 24px; box-shadow: 0 4px 16px rgba(0,123,255,0.3); cursor: pointer; display: flex; align-items: center; gap: 10px; font-family: system-ui, sans-serif; transition: transform 0.2s ease, background 0.3s;">
        <span id="chatStatusDot" style="width: 8px; height: 8px; background-color: #28a745; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #28a745; animation: pulse 2s infinite;"></span>
        <span style="font-weight: 600; font-size: 14px; letter-spacing: 0.5px;">Chat Support</span>
    </button>
    
    <div id="chatBox" style="display: none; position: fixed; bottom: 90px; right: 25px; width: 360px; height: 500px; background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); border: 1px solid rgba(0,0,0,0.05); flex-direction: column; z-index: 1000; overflow: hidden; font-family: system-ui, sans-serif;">
        
        <div style="background: #1a1a1a; color: white; padding: 16px; display: flex; align-items: center; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 36px; height: 36px; background: #007bff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">T</div>
                <div>
                    <h4 style="margin: 0; font-size: 14px; font-weight: 600;">Timea Classic Support</h4>
                    <p id="chatStatusText" style="margin: 0; font-size: 11px; color: #a0a0a0;">We're online to help</p>
                </div>
            </div>
            <button id="closeChat" style="background: none; border: none; color: #888; font-size: 20px; cursor: pointer; padding: 0 5px;">&times;</button>
        </div>
    
        <div id="chatMessages" style="flex-grow: 1; overflow-y: auto; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; gap: 14px;">
            
            <div style="align-self: flex-end; max-width: 75%;">
                <div style="background: #007bff; color: white; padding: 10px 14px; border-radius: 16px 16px 4px 16px; font-size: 13px; line-height: 1.4; box-shadow: 0 2px 4px rgba(0,123,255,0.15);">
                    Hi, I'd like to check my order status.
                </div>
                <span style="font-size: 10px; color: #999; margin-top: 4px; display: block; text-align: right; padding-right: 2px;">14:32</span>
            </div>
    
            <div style="align-self: flex-start; max-width: 75%;">
                <div style="background: white; color: #333; padding: 10px 14px; border-radius: 16px 16px 16px 4px; font-size: 13px; line-height: 1.4; box-shadow: 0 2px 6px rgba(0,0,0,0.04); border: 1px solid #eaeaea;">
                    Hello! Let me check that for you right now. Could you please share your order number?
                </div>
                <span style="font-size: 10px; color: #999; margin-top: 4px; display: block; padding-left: 2px;">14:33</span>
            </div>
    
        </div>
    
        <div style="padding: 12px 16px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; gap: 10px;">
            <input id="chatInput" type="text" style="flex-grow: 1; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 24px; font-size: 13px; outline: none; background: #fdfdfd; transition: border-color 0.2s;" placeholder="Type your message...">
            <button id="sendButton" style="background-color: #007bff; color: white; border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; box-shadow: 0 2px 8px rgba(0,123,255,0.2);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
    
    <style>
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(40, 167, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
        #chatButton:hover { transform: translateY(-2px); background: linear-gradient(135deg, #0056b3, #004085); }
        #chatInput:focus { border-color: #007bff; background: white; }
    </style>
    
    <script>
        const chatButton = document.getElementById('chatButton');
        const chatBox = document.getElementById('chatBox');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatStatus = document.getElementById('chatStatus');
        const sendButton = document.getElementById('sendButton');
    
        chatButton.addEventListener('click', () => {
            chatBox.style.display = chatBox.style.display === 'none' ? 'flex' : 'none';
        });
    
        const roomName = "{{ chat_room_name|escapejs }}";
        console.log("Room Name:", roomName);
    
        if (roomName) {
            const chatSocket = new WebSocket(
                'ws://' + window.location.host + '/ws/chat/' + roomName + '/'
            );
    
            chatSocket.onopen = function() {
                console.log('Connected to WebSocket');
                chatStatus.textContent = "Chat with us";
            };
    
            chatSocket.onmessage = function(e) {
                const data = JSON.parse(e.data);
                const messageContainer = document.getElementById('chatMessages');
                
                const wrapper = document.createElement('div');
                wrapper.style.maxWidth = "75%";
                
                if (data.username === "{{ request.user.username }}") {
                    wrapper.style.alignSelf = "flex-end";
                    wrapper.innerHTML = `
                        <div style="background: #007bff; color: white; padding: 10px 14px; border-radius: 16px 16px 4px 16px; font-size: 13px; line-height: 1.4; box-shadow: 0 2px 4px rgba(0,123,255,0.15);">
                            ${data.message}
                        </div>
                    `;
                } else {
                    wrapper.style.alignSelf = "flex-start";
                    wrapper.innerHTML = `
                        <div style="background: white; color: #333; padding: 10px 14px; border-radius: 16px 16px 16px 4px; font-size: 13px; line-height: 1.4; box-shadow: 0 2px 6px rgba(0,0,0,0.04); border: 1px solid #eaeaea;">
                            <strong style="font-size: 11px; display:block; color: #007bff; margin-bottom: 2px;">${data.username}</strong>
                            ${data.message}
                        </div>
                    `;
                }
            
                messageContainer.appendChild(wrapper);
                messageContainer.scrollTop = messageContainer.scrollHeight;
            };
    
            chatSocket.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
    
            chatSocket.onclose = function(e) {
                console.log('Chat socket closed:', e.code, e.reason);
                chatStatus.textContent = "We're offline";
            };
    
            chatInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && this.value.trim() !== '') {
                    chatSocket.send(JSON.stringify({'message': this.value.trim()}));
                    this.value = '';
                }
            });
    
            sendButton.addEventListener('click', () => {
                if (chatInput.value.trim() !== '') {
                    chatSocket.send(JSON.stringify({'message': chatInput.value.trim()}));
                    chatInput.value = '';
                }
            });
        } else {
            console.log("Room name not available. User might not be logged in.");
        }
    </script>
{% endif %}
